spring:
  application:
    name: api-gateway-micro

  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:

        - id: product-service-micro
          uri: lb://product-service-micro
          predicates:
            - Path=/api/products,/api/products/**
          filters:
            - StripPrefix=1

        - id: order-service-micro
          uri: lb://order-service-micro
          predicates:
            - Path=/api/orders,/api/orders/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 5
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    fetch-registry: true
    register-with-eureka: true

server:
  port: 8085
